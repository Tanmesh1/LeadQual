services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir src
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lead_qualification}
      POSTGRES_USER: ${POSTGRES_USER:-lead_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lead_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lead_user} -d ${POSTGRES_DB:-lead_qualification}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
